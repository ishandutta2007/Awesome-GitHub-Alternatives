<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a2a72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009ffd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="15" ry="15" />
  
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    Awesome GitHub Alternatives 🚀
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
  </text>
  <text x="50%" y="75%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#e0e0e0">
    Explore the top platforms for code hosting &amp; collaboration 🌟
  </text>
  <circle cx="100" cy="100" r="10" fill="#ffffff" opacity="0.5">
    <animate attributeName="cy" values="100;80;100" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="120" r="15" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" values="120;140;120" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
